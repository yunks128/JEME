name: Mirror to nasa-jpl/jeme

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify token has access to nasa-jpl/jeme
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.NASA_JPL_MIRROR_TOKEN }}" \
            https://api.github.com/repos/nasa-jpl/jeme)
          echo "GitHub API status: $status"
          if [ "$status" != "200" ]; then
            echo "ERROR: Cannot reach nasa-jpl/jeme (HTTP $status)."
            echo "Check that NASA_JPL_MIRROR_TOKEN has write access to nasa-jpl/jeme"
            echo "and, if the org uses SAML SSO, that the token is SSO-authorized."
            exit 1
          fi

      - name: Push mirror to nasa-jpl/jeme
        run: |
          git remote add nasa-jpl https://x-access-token:${{ secrets.NASA_JPL_MIRROR_TOKEN }}@github.com/nasa-jpl/jeme.git
          git push nasa-jpl --mirror
