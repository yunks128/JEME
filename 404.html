<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JEME Dashboard</title>
  <script>
    // GitHub Pages SPA routing trick.
    // When GH Pages 404s on a deep link (e.g. /jeme/ECCO), it serves this file.
    // We encode the intended path as ?/... and redirect to index.html,
    // where a companion script restores the original URL before React boots.
    var segmentCount = 1; // number of path segments in the repo basename (/jeme = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
